---
# ══════════════════════════════════════════════
# 1. MISE A JOUR SYSTEME
# ══════════════════════════════════════════════
- name: Mettre à jour les paquets
  apt:
    update_cache: true
    upgrade: dist

- name: Vérifier si un redémarrage est nécessaire
  stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Redémarrer si nécessaire (*** System restart required ***)
  reboot:
    msg: "Redémarrage requis après mise à jour du système"
    reboot_timeout: 300
  when: reboot_required.stat.exists

# ══════════════════════════════════════════════
# 2. JAVA
# ══════════════════════════════════════════════
- name: Installer Java 21
  apt:
    name: openjdk-21-jdk
    state: present

- name: Définir Java 21 comme version par défaut
  alternatives:
    name: java
    path: /usr/lib/jvm/java-21-openjdk-amd64/bin/java

# ══════════════════════════════════════════════
# 3. JENKINS
# ══════════════════════════════════════════════
- name: Télécharger la clé Jenkins
  get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
    dest: /tmp/jenkins.key
    mode: '0644'

- name: Convertir et installer la clé Jenkins (gpg --dearmor)
  shell: gpg --dearmor < /tmp/jenkins.key > /usr/share/keyrings/jenkins-keyring.gpg
  args:
    creates: /usr/share/keyrings/jenkins-keyring.gpg

- name: Ajouter le repo Jenkins
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/"
    state: present
    filename: jenkins

- name: Installer Jenkins
  apt:
    name: jenkins
    state: present
    update_cache: true

- name: Démarrer et activer Jenkins
  systemd:
    name: jenkins
    state: started
    enabled: true

# ══════════════════════════════════════════════
# 4. DOCKER
# ══════════════════════════════════════════════
- name: Installer les dépendances Docker
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
    state: present

- name: Télécharger la clé Docker
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker.key
    mode: '0644'

- name: Convertir et installer la clé Docker (gpg --dearmor)
  shell: gpg --dearmor < /tmp/docker.key > /usr/share/keyrings/docker-keyring.gpg
  args:
    creates: /usr/share/keyrings/docker-keyring.gpg

- name: Ajouter le repo Docker
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-keyring.gpg] https://download.docker.com/linux/ubuntu jammy stable"
    state: present
    filename: docker

- name: Installer Docker
  apt:
    name: docker-ce
    state: present
    update_cache: true

- name: Ajouter jenkins au groupe docker
  user:
    name: jenkins
    groups: docker
    append: true

- name: Démarrer et activer Docker
  systemd:
    name: docker
    state: started
    enabled: true

# ══════════════════════════════════════════════
# 5. KUBECTL
# ══════════════════════════════════════════════
- name: Télécharger kubectl
  get_url:
    url: https://dl.k8s.io/release/v1.20.0/bin/linux/amd64/kubectl
    dest: /usr/local/bin/kubectl
    mode: '0755'

# ══════════════════════════════════════════════
# 6. HELM
# ══════════════════════════════════════════════
- name: Télécharger le script Helm
  get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get-helm.sh
    mode: '0755'

- name: Installer Helm
  command: /tmp/get-helm.sh
  args:
    creates: /usr/local/bin/helm

# ══════════════════════════════════════════════
# 7. AKS-ENGINE
# ══════════════════════════════════════════════
- name: Télécharger aks-engine-azurestack
  get_url:
    url: https://github.com/Azure/aks-engine-azurestack/releases/download/v0.80.2/aks-engine-azurestack-v0.80.2-linux-amd64.tar.gz
    dest: /tmp/aks-engine.tar.gz

- name: Extraire aks-engine-azurestack
  unarchive:
    src: /tmp/aks-engine.tar.gz
    dest: /tmp/
    remote_src: true

- name: Installer aks-engine-azurestack
  copy:
    src: /tmp/aks-engine-azurestack-v0.80.2-linux-amd64/aks-engine-azurestack
    dest: /usr/local/bin/aks-engine-azurestack
    mode: '0755'
    remote_src: true

# ══════════════════════════════════════════════
# 8. MOT DE PASSE JENKINS
# ══════════════════════════════════════════════
- name: Récupérer le mot de passe initial Jenkins
  command: cat /var/lib/jenkins/secrets/initialAdminPassword
  register: jenkins_password
  changed_when: false

- name: Afficher le mot de passe Jenkins
  debug:
    msg: "Mot de passe Jenkins : {{ jenkins_password.stdout }}"
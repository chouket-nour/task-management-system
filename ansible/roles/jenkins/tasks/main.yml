# ═══════════════════════════════════════
# 1. SYSTEM UPDATE
# ═══════════════════════════════════════
- name: Update system packages
  apt:
    update_cache: yes
    upgrade: dist
    cache_valid_time: 3600

- name: Install base tools
  apt:
    name:
      - curl
      - wget
      - gnupg
      - apt-transport-https
      - ca-certificates
      - software-properties-common
      - unzip
      - git
    state: present

- name: Check if reboot required
  stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Reboot if required
  reboot:
    msg: "Reboot required after system update"
    reboot_timeout: 300
  when: reboot_required.stat.exists

# ═══════════════════════════════════════
# 2. JAVA
# ═══════════════════════════════════════
- name: Install Java 21
  apt:
    name: openjdk-21-jdk
    state: present

- name: Set Java 21 default
  alternatives:
    name: java
    path: /usr/lib/jvm/java-21-openjdk-amd64/bin/java

- name: Verify Java
  command: java -version
  register: java_version
  changed_when: false

- name: Show Java version
  debug:
    msg: "Java installed: {{ java_version.stderr }}"

# ═══════════════════════════════════════
# 3. JENKINS
# ═══════════════════════════════════════
- name: Download Jenkins key
  get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
    dest: /tmp/jenkins.key
    mode: '0644'

- name: Convert Jenkins key to gpg
  shell: |
    gpg --dearmor -o /usr/share/keyrings/jenkins-keyring.gpg /tmp/jenkins.key
  args:
    creates: /usr/share/keyrings/jenkins-keyring.gpg

- name: Add Jenkins repository
  apt_repository:
    repo: >
      deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg]
      https://pkg.jenkins.io/debian-stable binary/
    state: present
    filename: jenkins

- name: Install Jenkins
  apt:
    name: jenkins
    state: present
    update_cache: yes

- name: Enable and start Jenkins
  systemd:
    name: jenkins
    enabled: true
    state: started

- name: Wait for Jenkins to be ready
  wait_for:
    port: 8080
    delay: 10
    timeout: 120

# ═══════════════════════════════════════
# 4. DOCKER
# ═══════════════════════════════════════
- name: Supprimer les anciennes clés Docker en conflit
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/share/keyrings/docker-keyring.gpg
    - /usr/share/keyrings/docker.gpg
    - /etc/apt/sources.list.d/docker.list

- name: Download Docker key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker.key
    mode: '0644'

- name: Convert Docker key to gpg
  shell: |
    gpg --dearmor -o /usr/share/keyrings/docker.gpg /tmp/docker.key
  args:
    creates: /usr/share/keyrings/docker.gpg

- name: Add Docker repository
  apt_repository:
    repo: >
      deb [arch=amd64 signed-by=/usr/share/keyrings/docker.gpg]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Enable and start Docker
  systemd:
    name: docker
    enabled: true
    state: started

- name: Verify Docker
  command: docker --version
  register: docker_version
  changed_when: false

- name: Show Docker version
  debug:
    msg: "Docker installed: {{ docker_version.stdout }}"

# ═══════════════════════════════════════
# 5. DOCKER COMPOSE STANDALONE
# ═══════════════════════════════════════
- name: Get latest docker-compose version
  uri:
    url: https://api.github.com/repos/docker/compose/releases/latest
    return_content: true
    headers:
      Accept: application/vnd.github.v3+json
  register: compose_release

- name: Install docker-compose standalone
  get_url:
    url: "https://github.com/docker/compose/releases/download/{{ compose_release.json.tag_name }}/docker-compose-linux-x86_64"
    dest: /usr/local/bin/docker-compose
    mode: '0755'
    owner: root
    group: root

- name: Verify docker-compose
  command: docker-compose --version
  register: compose_version
  changed_when: false

- name: Show docker-compose version
  debug:
    msg: "docker-compose installed: {{ compose_version.stdout }}"

# ═══════════════════════════════════════
# 6. DOCKER ACCESS FOR JENKINS
# ═══════════════════════════════════════
- name: Add jenkins to docker group
  user:
    name: jenkins
    groups: docker
    append: yes

- name: Add nouradmin to docker group
  user:
    name: nouradmin
    groups: docker
    append: yes

- name: Run SonarQube container
  community.docker.docker_container:
    name: sonarqube
    image: sonarqube:lts-community
    state: started
    restart_policy: unless-stopped
    ports:
      - "9000:9000"

# ═══════════════════════════════════════
# 7. CACHE SETUP
# ═══════════════════════════════════════
- name: Ensure Jenkins home exists
  file:
    path: "{{ jenkins_home }}"
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'

- name: Create Jenkins cache directories
  file:
    path: "{{ jenkins_home }}/.cache/{{ item }}"
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'
  loop:
    - npm
    - mongodb-binaries
    - trivy

- name: Create npm-cache root directory
  file:
    path: "{{ jenkins_home }}/.npm-cache"
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'

- name: Configure npm cache via .npmrc
  copy:
    content: |
      cache={{ jenkins_home }}/.npm-cache
    dest: "{{ jenkins_home }}/.npmrc"
    owner: jenkins
    group: jenkins
    mode: '0644'

# ═══════════════════════════════════════
# 8. SYSTEMD OVERRIDE
# ═══════════════════════════════════════
- name: Create Jenkins systemd override directory
  file:
    path: /etc/systemd/system/jenkins.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Configure Jenkins HOME and NPM cache override
  copy:
    content: |
      [Service]
      Environment="HOME={{ jenkins_home }}"
      Environment="NPM_CONFIG_CACHE={{ jenkins_home }}/.npm-cache"
    dest: /etc/systemd/system/jenkins.service.d/override.conf
    owner: root
    group: root
    mode: '0644'

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

# ═══════════════════════════════════════
# 9. TRIVY
# ═══════════════════════════════════════
- name: Download Trivy key
  get_url:
    url: https://aquasecurity.github.io/trivy-repo/deb/public.key
    dest: /tmp/trivy.key
    mode: '0644'

- name: Convert Trivy key to gpg
  shell: |
    gpg --dearmor -o /usr/share/keyrings/trivy.gpg /tmp/trivy.key
  args:
    creates: /usr/share/keyrings/trivy.gpg

- name: Add Trivy repository
  apt_repository:
    repo: >
      deb [signed-by=/usr/share/keyrings/trivy.gpg]
      https://aquasecurity.github.io/trivy-repo/deb generic main
    state: present
    filename: trivy

- name: Install Trivy
  apt:
    name: trivy
    state: present
    update_cache: yes

- name: Verify Trivy
  command: trivy --version
  register: trivy_version
  changed_when: false

- name: Show Trivy version
  debug:
    msg: "Trivy installed: {{ trivy_version.stdout }}"

# ═══════════════════════════════════════
# 10. SONARQUBE SCANNER
# ═══════════════════════════════════════
- name: Create SonarScanner directory
  file:
    path: /opt/sonar-scanner
    state: directory
    mode: '0755'

- name: Download SonarScanner
  get_url:
    url: "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-6.0.0.4432-linux.zip"
    dest: /tmp/sonar-scanner.zip
    mode: '0644'

- name: Extract SonarScanner
  unarchive:
    src: /tmp/sonar-scanner.zip
    dest: /opt/
    remote_src: yes
    creates: /opt/sonar-scanner-6.0.0.4432-linux

- name: Create SonarScanner symlink
  file:
    src: /opt/sonar-scanner-6.0.0.4432-linux
    dest: /opt/sonar-scanner
    state: link
    force: yes

- name: Make SonarScanner executable
  file:
    path: /opt/sonar-scanner-6.0.0.4432-linux/bin/sonar-scanner
    mode: '0755'

- name: Create Jenkins .sonar cache directory
  file:
    path: "{{ jenkins_home }}/.sonar"
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'

- name: Show SonarScanner info
  debug:
    msg:
      - "SonarScanner installé dans : /opt/sonar-scanner"
      - "IMPORTANT : Configurer dans Jenkins UI :"
      - "  Manage Jenkins > Tools > SonarScanner"
      - "    Name : SonarScanner"
      - "    Path : /opt/sonar-scanner"
      - "  Manage Jenkins > System > SonarQube servers"
      - "    Name : SonarQube"
      - "    URL  : http://IP_SONAR:9000"

# ═══════════════════════════════════════
# 11. KUBECTL
# ═══════════════════════════════════════
- name: Set default kubectl version
  set_fact:
    kubectl_version: "{{ kubectl_version | default('v1.30.1') }}"

- name: Install kubectl
  get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: '0755'

- name: Verify kubectl
  command: kubectl version --client
  register: kubectl_version_out
  changed_when: false

- name: Show kubectl version
  debug:
    msg: "kubectl installed: {{ kubectl_version_out.stdout }}"

# ═══════════════════════════════════════
# 12. HELM
# ═══════════════════════════════════════
- name: Download Helm archive
  get_url:
    url: https://get.helm.sh/helm-v3.15.1-linux-amd64.tar.gz
    dest: /tmp/helm.tar.gz
    mode: '0644'

- name: Extract Helm archive
  unarchive:
    src: /tmp/helm.tar.gz
    dest: /tmp
    remote_src: yes

- name: Install Helm binary
  copy:
    src: /tmp/linux-amd64/helm
    dest: /usr/local/bin/helm
    mode: '0755'
    remote_src: yes

- name: Verify Helm
  command: helm version
  register: helm_version
  changed_when: false

- name: Show Helm version
  debug:
    msg: "Helm installed: {{ helm_version.stdout }}"

# ═══════════════════════════════════════
# 13. FINAL RESTART JENKINS
# ═══════════════════════════════════════
- name: Restart Jenkins to apply all configs
  systemd:
    name: jenkins
    state: restarted

- name: Wait for Jenkins to be ready after restart
  wait_for:
    port: 8080
    delay: 15
    timeout: 120

- name: Verify Jenkins can use Docker
  command: sudo -u jenkins docker ps
  register: docker_check
  changed_when: false
  failed_when: false

- name: Show Docker access result for jenkins
  debug:
    msg: "{{ docker_check.stdout | default(docker_check.stderr) }}"

# ═══════════════════════════════════════
# 14. GET JENKINS PASSWORD
# ═══════════════════════════════════════
- name: Get Jenkins initial admin password
  command: cat {{ jenkins_home }}/secrets/initialAdminPassword
  register: jenkins_password
  changed_when: false
  failed_when: false

# ═══════════════════════════════════════
# 15. KUBECONFIG POUR JENKINS
# ═══════════════════════════════════════
- name: Trouver le kubeconfig automatiquement
  tags: kubeconfig
  set_fact:
        kubeconfig_local_path: "{{ lookup('fileglob', playbook_dir + '/../terraform/modules/aks/_output/kubeconfig/*.json') }}"


- name: Afficher le kubeconfig trouvé
  tags: kubeconfig
  debug:
    msg: "Kubeconfig trouvé : {{ kubeconfig_local_path }}"

- name: Créer le répertoire .kube pour Jenkins
  tags: kubeconfig
  file:
    path: "{{ jenkins_home }}/.kube"
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'

- name: Copier le kubeconfig vers Jenkins
  tags: kubeconfig
  copy:
    src: "{{ kubeconfig_local_path }}"
    dest: "{{ jenkins_home }}/.kube/config"
    owner: jenkins
    group: jenkins
    mode: '0600'

- name: Vérifier que Jenkins accède au cluster
  tags: kubeconfig
  command: kubectl --kubeconfig={{ jenkins_home }}/.kube/config get nodes
  become: true
  register: kubectl_nodes
  changed_when: false
  failed_when: false

- name: Afficher les nodes accessibles depuis Jenkins
  tags: kubeconfig
  debug:
    msg: "{{ kubectl_nodes.stdout }}"

# ═══════════════════════════════════════
# 17. MONITORING — Prometheus + Grafana
# ═══════════════════════════════════════
- name: Ajouter repo prometheus-community
  shell: |
    sudo -u jenkins \
      HOME={{ jenkins_home }} \
      KUBECONFIG={{ jenkins_home }}/.kube/config \
      helm repo add prometheus-community \
        https://prometheus-community.github.io/helm-charts
    sudo -u jenkins \
      HOME={{ jenkins_home }} \
      helm repo update
  become: true
  changed_when: false
  tags: monitoring

- name: Créer namespace monitoring
  shell: |
    sudo -u jenkins \
      KUBECONFIG={{ jenkins_home }}/.kube/config \
      kubectl create namespace monitoring \
        --dry-run=client -o yaml | \
    sudo -u jenkins \
      KUBECONFIG={{ jenkins_home }}/.kube/config \
      kubectl apply -f -
  become: true
  changed_when: false
  tags: monitoring

- name: Copier le fichier values monitoring
  template:
    src: monitoring-values.yaml.j2
    dest: /tmp/monitoring-values.yaml
    owner: jenkins
    group: jenkins
    mode: '0600'
  tags: monitoring

- name: Installer Prometheus + Grafana via Helm
  shell: |
    sudo -u jenkins \
      HOME={{ jenkins_home }} \
      KUBECONFIG={{ jenkins_home }}/.kube/config \
      helm upgrade --install monitoring \
        prometheus-community/kube-prometheus-stack \
        --version 45.31.1 \
        --namespace monitoring \
        --create-namespace \
        -f /tmp/monitoring-values.yaml \
        --wait --timeout 10m
  become: true
  timeout: 700
  tags: monitoring

- name: Vérifier les pods monitoring
  shell: |
    sudo -u jenkins \
      KUBECONFIG={{ jenkins_home }}/.kube/config \
      kubectl get pods -n monitoring
  become: true
  register: monitoring_pods
  changed_when: false
  tags: monitoring

- name: Afficher pods monitoring
  debug:
    msg: "{{ monitoring_pods.stdout_lines }}"
  tags: monitoring

- name: Récupérer IP externe Grafana
  shell: |
    sudo -u jenkins \
      KUBECONFIG={{ jenkins_home }}/.kube/config \
      kubectl get svc monitoring-grafana \
        -n monitoring \
        -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
  become: true
  register: grafana_ip
  changed_when: false
  retries: 10
  delay: 30
  until: grafana_ip.stdout != ""
  tags: monitoring

- name: Nettoyer fichier values temporaire
  file:
    path: /tmp/monitoring-values.yaml
    state: absent
  tags: monitoring
# ═══════════════════════════════════════
# 17. Installation summary 
# ═══════════════════════════════════════
- name: Installation summary
  debug:
    msg:
      - "════════════════════════════════════════════"
      - "         CI/CD SERVER READY"
      - "════════════════════════════════════════════"
      - "Java          : {{ java_version.stderr | regex_search('openjdk version.*') }}"
      - "Docker        : {{ docker_version.stdout }}"
      - "Compose       : {{ compose_version.stdout }}"
      - "Trivy         : {{ trivy_version.stdout.split()[1] }}"
      - "kubectl       : {{ kubectl_version }}"
      - "Helm          : {{ helm_version.stdout }}"
      - "SonarScanner  : /opt/sonar-scanner"
      - "Jenkins URL   : http://{{ ansible_host }}:8080"
      - "Kubeconfig    : {{ jenkins_home }}/.kube/config"
      - "Mot de passe  : {{ jenkins_password.stdout | default('déjà configuré') }}"
      - "════════════════════════════════════════════"
      - "CACHE NPM     : {{ jenkins_home }}/.npm-cache"
      - "CACHE MONGO   : {{ jenkins_home }}/.cache/mongodb-binaries"
      - "CACHE TRIVY   : {{ jenkins_home }}/.cache/trivy"
      - "CACHE SONAR   : {{ jenkins_home }}/.sonar"
      - "════════════════════════════════════════════"
      - "MONITORING"
      - "Grafana URL   : http://{{ grafana_ip.stdout }}:80"
      - "Login         : admin / {{ vault_grafana_password }}"
      - "════════════════════════════════════════════"
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rfc-waiter
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rfc-waiter-role
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rfc-waiter-binding
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: rfc-waiter
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: rfc-waiter-role
  apiGroup: rbac.authorization.k8s.io
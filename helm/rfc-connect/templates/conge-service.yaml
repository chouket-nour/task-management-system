apiVersion: apps/v1
kind: Deployment
metadata:
  name: conge-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicas.conge }}
  selector:
    matchLabels:
      app: conge-service
  template:
    metadata:
      labels:
        app: conge-service
    spec:
      serviceAccountName: rfc-waiter
      {{- include "rfc.dns.config" . | nindent 6 }}
      {{- include "rfc.init.mongodb" . | nindent 6 }}
      containers:
        - name: conge-service
          image: {{ .Values.image.registry }}/rfc-conge-service:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 5005
          env:
            {{- include "rfc.env.common" . | nindent 12 }}
            - name: MONGO_URI
              value: {{ .Values.mongo.uriConge }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: 5005
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path:  /health/ready
              port: 5005
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
---
apiVersion: v1
kind: Service
metadata:
  name: conge-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: conge-service
  ports:
    - port: 5005
      targetPort: 5005
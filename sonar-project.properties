# ─── Identification ───────────────────────────────────────────────────────────
sonar.projectKey=rfc-connect
sonar.projectName=RFC Connect

# ─── Sources & Tests ──────────────────────────────────────────────────────────
sonar.sources=backend
sonar.tests=backend
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# ─── Exclusions ───────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**, \
  **/coverage/**, \
  **/*.test.js, \
  **/*.spec.js, \
  **/dist/**, \
  **/build/**, \
  **/server.js, \
  **/config/db.js, \
  frontend/**

# ─── Coverage ─────────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ─── Encoding ─────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
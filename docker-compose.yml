version: "3.8"

services:

  # ── MongoDB ──
  mongodb:
    image: mongo:6
    container_name: mongodb
    restart: unless-stopped
    ports: 
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - rfc-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Notification Service ──
  notification-service:
    image: nourchouket2000/rfc-notification-service:${IMAGE_TAG}
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "5006:5006"
    environment:
      - PORT=5006
      - MONGO_URI=${MONGO_URI_NOTIF}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - rfc-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5006/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s

  # ── Auth Service ──
  auth-service:
    image: nourchouket2000/rfc-auth-service:${IMAGE_TAG}
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=${MONGO_URI_AUTH}
      - JWT_SECRET=${JWT_SECRET}
      - USER_SERVICE_URL=${USER_SERVICE_URL}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - rfc-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s

  # ── User Service ──
  user-service:
    image: nourchouket2000/rfc-user-service:${IMAGE_TAG}
    container_name: user-service
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGO_URI=${MONGO_URI_USER}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - rfc-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5002/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s

  # ── Task Service ──
  task-service:
    image: nourchouket2000/rfc-task-service:${IMAGE_TAG}
    container_name: task-service
    restart: unless-stopped
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - MONGO_URI=${MONGO_URI_TASK}
      - JWT_SECRET=${JWT_SECRET}
      - NOTIF_SERVICE_URL=http://notification-service:5006/api/notifications
    depends_on:
      mongodb:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - rfc-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5003/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s

  # ── Project Service ──
  project-service:
    image: nourchouket2000/rfc-project-service:${IMAGE_TAG}
    container_name: project-service
    restart: unless-stopped
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - MONGO_URI=${MONGO_URI_PROJECT}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - rfc-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5004/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s

  # ── Conge Service ──
  conge-service:
    image: nourchouket2000/rfc-conge-service:${IMAGE_TAG}
    container_name: conge-service
    restart: unless-stopped
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - MONGO_URI=${MONGO_URI_CONGE}
      - JWT_SECRET=${JWT_SECRET}
      - NOTIF_SERVICE_URL=http://notification-service:5006/api/notifications
    depends_on:
      mongodb:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - rfc-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5005/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s

  # ── API Gateway ──
  api-gateway:
    image: nourchouket2000/rfc-api-gateway:${IMAGE_TAG}
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - USER_SERVICE_URL=${USER_SERVICE_URL}
      - TASK_SERVICE_URL=${TASK_SERVICE_URL}
      - PROJECT_SERVICE_URL=${PROJECT_SERVICE_URL}
      - CONGE_SERVICE_URL=${CONGE_SERVICE_URL}
      - NOTIF_SERVICE_URL=${NOTIF_SERVICE_URL}
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      task-service:
        condition: service_healthy
      project-service:
        condition: service_healthy
      conge-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - rfc-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend ──
  frontend:
    image: nourchouket2000/rfc-frontend:${IMAGE_TAG}
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000}
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - rfc-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Jenkins ──
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - rfc-network

  # ── SonarQube ──
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - rfc-network

networks:
  rfc-network:
    driver: bridge

volumes:
  mongo_data:
  jenkins_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions: